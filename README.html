<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0b0b12;--surface:#13131f;--card:rgba(8,8,40,0.55);--border:rgba(0,212,255,0.10);
    --text:#d0d8f0;--muted:#6b7394;--accent:#00d4ff;--green:#00e5a0;
    --red:#ff4470;--amber:#ffb347;--radius:14px;--gap:12px;
  }

  body{
    background:#020010;color:var(--text);display:flex;flex-direction:column;

    padding:16px;gap:var(--gap);
  }
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

  #top-bar{
    width:100%;max-width:800px;display:flex;align-items:center;
    justify-content:center;gap:8px;flex-wrap:wrap;
  }
  #scramble-text{
    font-family:"JetBrains Mono","SF Mono","Consolas",monospace;

    background:rgba(255,255,255,0.03);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius);
    padding:16px 20px;white-space:normal;word-break:break-all;text-align:center;transition:border-color .3s,box-shadow .3s;
  }

  .pill-btn{
    padding:8px 16px;border:1px solid rgba(255,255,255,0.05);border-radius:24px;
    background:rgba(255,255,255,0.03);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    color:var(--muted);font-size:12px;font-weight:500;letter-spacing:0.2px;
    cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);white-space:nowrap;
  }
  .pill-btn:hover{background:rgba(255,255,255,0.06);color:var(--text);border-color:rgba(255,255,255,0.12);transform:translateY(-1px)}

  #mode-toggle{
    padding:8px 18px;border-radius:24px;border:none;

  #mode-toggle.normal{background:#3b82f6;color:#fff;border:none}

  #cube-type-btn{
    padding:8px 18px;border-radius:24px;border:none;

    cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);white-space:nowrap;
  }
  #cube-type-btn:hover{opacity:.85}
  #cube-type-btn.c2{background:linear-gradient(135deg,var(--accent),#0090ff);color:#0a0a1a}
  #cube-type-btn.c3{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
  #ready-ms{

  #main-layout{

  }
  #cube-wrap{
    width:280px;height:280px;flex-shrink:0;

  #cube-wrap canvas{display:block;margin:0 auto}

  #timer-card{
    flex:1;min-width:200px;display:flex;flex-direction:column;
    align-items:center;gap:12px;
    background:rgba(255,255,255,0.02);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius);
    padding:28px 24px 24px;transition:border-color .3s;
  }
  #timer-card:hover{border-color:rgba(255,255,255,0.1)}
  #timer{
    font-family:"JetBrains Mono","SF Mono","Consolas",monospace;
    font-size:68px;font-weight:600;color:#fff;letter-spacing:2px;
    line-height:1;transition:color .3s;font-variant-numeric:tabular-nums;
  }
  #timer.ready{color:var(--green)}
  #timer.running{color:#fff}

  #stats-row{
    display:flex;gap:16px;flex-wrap:wrap;justify-content:center;

  }

  #times-wrap{

    background:rgba(255,255,255,0.02);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);

  }
  #times-table{width:100%;border-collapse:collapse;font-size:13px}

#resize-handle{position:absolute;bottom:2px;right:2px;width:18px;height:18px;color:rgba(255,255,255,0.4);font-size:16px;line-height:18px;text-align:center;cursor:nwse-resize;display:none;z-index:10;user-select:none}
.virtual-layout #resize-handle{display:block}

  @media(max-width:640px){
    body{padding:env(safe-area-inset-top,10px) max(env(safe-area-inset-right,10px),10px) env(safe-area-inset-bottom,10px) max(env(safe-area-inset-left,10px),10px);gap:8px}
    #top-bar{justify-content:center;gap:6px}
    #scramble-text{flex:1 1 100%;min-width:100%;font-size:13px;padding:8px 10px}

    .stat-card .val{font-size:15px}
    .pill-btn{font-size:11px;padding:6px 12px}
    #mode-toggle{font-size:11px;padding:6px 14px}
    .act-btn{padding:3px 10px;border-radius:6px;font-size:10px;font-weight:500;transition:all .2s;padding:5px 10px;font-size:11px;border-radius:6px}
    #btn-reset{padding:10px 24px;font-size:13px}
    #times-table{font-size:12px}
    #times-table td,#times-table th{padding:6px 4px}
    #drag-handle{width:32px;height:32px;font-size:18px;line-height:32px;top:2px;right:2px}
    #resize-handle{width:28px;height:28px;font-size:22px;line-height:28px;bottom:1px;right:1px}
    .virtual-layout{flex-direction:column!important;align-items:center!important;gap:10px!important}
    .virtual-layout #cube-wrap{width:min(90vw,380px)!important;height:min(90vw,380px)!important;position:relative!important;margin:0 auto!important}
    .virtual-timer{width:auto!important;max-width:120px!important;min-width:unset!important;padding:10px 12px!important}
    .virtual-timer #timer{font-size:28px}
    #anim-scramble{display:none}
  }
  @media(max-width:480px){
    body{padding:6px;gap:6px}
    #scramble-text{font-size:12px;line-height:1.5;padding:6px 8px}
    #timer{font-size:36px;letter-spacing:1px}
    #timer-card{padding:12px 8px;gap:8px}
    #timer-state{font-size:11px}
    #times-wrap{max-height:120px;padding:6px 8px}
    #times-table{font-size:11px}
    #times-table td,#times-table th{padding:4px 3px}
    .stat-card{padding:6px 3px;min-width:calc(33.33% - 4px)}
    .stat-card .val{font-size:13px}
    .stat-card .lbl{font-size:10px}
    .pill-btn{font-size:10px;padding:5px 10px}
    #mode-toggle{font-size:10px;padding:5px 12px}
    .virtual-layout #cube-wrap{width:min(95vw,320px)!important;height:min(95vw,320px)!important;position:relative!important;margin:0 auto!important}
    .virtual-timer #timer{font-size:24px}
    #drag-handle{width:28px;height:28px;font-size:16px;line-height:28px}
    #resize-handle{width:24px;height:24px;font-size:20px;line-height:24px}
  }

  #splash{
    position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;
    background:#0b0b12;opacity:1;transition:opacity .6s ease-out;
  }
  #splash.hide{opacity:0;pointer-events:none}
  #splash-text{
    font-family:"JetBrains Mono","SF Mono","Consolas",monospace;
    font-size:clamp(28px,6vw,48px);font-weight:700;color:#fff;letter-spacing:2px;
    animation:splashIn .6s ease-out forwards;
  }
  @keyframes splashIn{
    0%{opacity:0;transform:scale(0.8);filter:blur(8px)}
    100%{opacity:1;transform:scale(1);filter:blur(0)}
  }
  #splash-sub{
    position:absolute;bottom:24vh;font-size:12px;color:var(--muted);letter-spacing:3px;
    animation:splashIn .5s ease-out .15s forwards;opacity:0;
  }


  /* ——— Space background ——— */
  #stars-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
  body::before{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(ellipse at 20% 50%,rgba(72,49,212,0.12) 0%,transparent 50%),
      radial-gradient(ellipse at 80% 20%,rgba(0,180,216,0.08) 0%,transparent 50%),
      radial-gradient(ellipse at 60% 80%,rgba(120,40,200,0.1) 0%,transparent 50%);
  }
  body>*{position:relative;z-index:1}


  #scramble-text{
    
  }
  #cube-wrap{
    box-shadow:0 8px 32px rgba(0,0,0,0.35);
  }
  #timer-card{
    
  }
  #times-wrap{
    box-shadow:0 4px 20px rgba(0,0,0,0.3);
  }
  .stat-card{
    box-shadow:0 4px 16px rgba(0,0,0,0.3);
  }
  .pill-btn{
    
  }
  .pill-btn.accent{box-shadow:0 4px 20px rgba(0,198,255,0.25);
    box-shadow:0 0 16px rgba(0,212,255,0.25);
  }
  #timer{
    text-shadow:0 0 30px rgba(0,212,255,0.3);
  }
  #timer.ready{color:#00e5a0;text-shadow:0 0 24px rgba(0,229,160,0.4)}
  #splash{
    background:radial-gradient(ellipse at center,#0d0d30 0%,#020010 70%);
  }
</style>
</head>
<body>
<canvas id="stars-canvas"></canvas>
<div id="splash">
  <div id="splash-text">cjq's timer</div>
  <div id="splash-sub">CUBE · 2x2 &amp; 3x3</div>
</div>


<div id="top-bar">
  <button id="next-scramble" class="pill-btn">下一组打乱</button>
  <button id="btn-solved" class="pill-btn">显示还原</button>

</div>

</div>

}

function processNextMove() {
  if (pendingMoves.length === 0) { isAnimating = false; return; }
  isAnimating = true;
  const moveName = pendingMoves.shift();
  const def = getMoveDefs()[moveName];
  if (!def) { processNextMove(); return; }
  const { axis, sign, val, wide, all, double } = def;
  const angle = double ? Math.PI : Math.PI/2;
  const targetQuat = new THREE.Quaternion().setFromAxisAngle(VEC_MAP[axis], angle*sign);
  const cubies = getFaceCubies(axis, val, wide, all);
  const snapshots = cubies.map(c => ({cubie:c, startPos:c.position.clone(), startQuat:c.quaternion.clone()}));
  const startTime = performance.now();
  function animStep(ts) {
    const t = Math.min((ts - startTime) / ANIM_SPEED, 1);
    const ease = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
    const partial = new THREE.Quaternion().setFromAxisAngle(VEC_MAP[axis], (Math.PI/2)*sign*ease);
    snapshots.forEach(s => {
      s.cubie.position.copy(s.startPos).applyQuaternion(partial);
      s.cubie.quaternion.copy(s.startQuat).premultiply(partial);

    }
  }
  return null;
}

function bgSwipeToMove(dx, dy) {
  const absDx = Math.abs(dx), absDy = Math.abs(dy);
  if (absDx < 16 && absDy < 16) return null;
  const isH = absDx > absDy * 1.2;
  if (isH) return dx < 0 ? "y" : "y'";
  if (absDy > absDx * 1.2) return dy < 0 ? "x'" : "x";
  return null;
}

function applyTouchMove(moveName) { queueMove(moveName); }

document.addEventListener("pointerdown", e => {
  if (!e.isPrimary) return;
  if (e.target.id === "mode-toggle" || e.target.id === "btn-solved" || e.target.id === "next-scramble" || e.target.id === "ready-ms" || e.target.id === "cube-size" || e.target.id === "drag-handle" || e.target.id === "resize-handle") return;
  e.preventDefault();
  touchStartX = e.clientX; touchStartY = e.clientY;
  isSwipeGesture = false;
  const hit = getCubieHit(e.clientX, e.clientY);
  if (!hit) { touchCubieNormal = null; touchCubieGrid = null; }
  else if (virtualMode) { touchCubieNormal = getFaceNormal(hit); const wp = hit.object.position.clone(); touchCubieGrid = { x: Math.round(wp.x), y: Math.round(wp.y), z: Math.round(wp.z) }; }
  else { touchCubieNormal = "body"; touchCubieGrid = null; pControls.enabled = false; }
});

document.addEventListener("pointermove", e => {
  if (!e.isPrimary) return;
  if (e.target.id === "drag-handle" || e.target.id === "resize-handle") return;
  const dx = e.clientX - touchStartX, dy = e.clientY - touchStartY;
  if (!isSwipeGesture && (Math.abs(dx) > SWIPE_THRESHOLD || Math.abs(dy) > SWIPE_THRESHOLD)) {
    isSwipeGesture = true;
    if (touchCubieNormal !== null || virtualMode) pControls.enabled = false;
  }
});

document.addEventListener("pointerup", e => {
  if (!e.isPrimary) return;
  if (e.target.id === "drag-handle" || e.target.id === "resize-handle") return;
  if (isSwipeGesture) {
    if (!virtualMode) pControls.enabled = true;
    e.stopPropagation();
    const dx = e.clientX - touchStartX, dy = e.clientY - touchStartY;
    if (touchCubieNormal === "body") { const m = bgSwipeToMove(dx, dy); if (m) queueMove(m); }
    else if (touchCubieNormal) { const m = cubieSwipeToMove(touchCubieNormal, touchCubieGrid, dx, dy); if (m) { queueMove(m); if (!timerRunning) { forceStartTimer(); saveOriginalState(); } } }
    else if (virtualMode) { const m = bgSwipeToMove(dx, dy); if (m) queueMove(m); }
  }
});

document.getElementById("timer-card").addEventListener("pointerdown", e => {
  e.preventDefault();
  if (virtualMode || timerRunning) return;
  if (keyDown) return;
  if (READY_THRESHOLD === 0) { forceStartTimer(); }
  else { touchActive = true; startReady(); }
});

window.addEventListener("pointerup", e => {
  if (timerRunning) { if (!virtualMode) { stopTimer(); } touchActive = false; return; }
  if (virtualMode) return;
  if (READY_THRESHOLD === 0) { touchActive = false; return; }
  if (!touchActive) return;
  touchActive = false;
  if (readyTimer && checkReady()) startTimer();
});

const times = [];
function saveTimes() { try { localStorage.setItem("cube_times", JSON.stringify(times)); localStorage.setItem("cube_order", cubeOrder); } catch(e){} }
function loadTimes() { try { const d=JSON.parse(localStorage.getItem("cube_times")); if(Array.isArray(d)){ times.push(...d); } const o=parseInt(localStorage.getItem("cube_order")); if(o===2||o===3) cubeOrder=o; const h=localStorage.getItem("cube_hollow"); if(h==="0") hollowStickers=false; if(h==="1") hollowStickers=true; } catch(e){} }
function addTime(ms) { times.unshift({ raw: ms, penalty: "none", scramble: currentScramble.join(" ") }); if (times.length > 200) times.length = 200; renderTimes(); updateStats(); saveTimes(); }
function effectiveTime(t) { if (t.penalty === "dnf") return Infinity; if (t.penalty === "plus2") return t.raw + 2000; return t.raw; }

function updateStats() {
  const valid = times.filter(t => t.penalty !== "dnf").map(t => effectiveTime(t));
  document.getElementById("s-count").textContent = times.length;
  if (valid.length === 0) { ["s-ao5","s-ao12","s-best","s-worst","s-mean"].forEach(id => document.getElementById(id).textContent = "-"); return; }
  const sorted = [...valid].sort((a,b)=>a-b);
  document.getElementById("s-best").textContent = fmtTime(sorted[0]);
  document.getElementById("s-worst").textContent = fmtTime(sorted[sorted.length-1]);
  document.getElementById("s-mean").textContent = fmtTime(Math.round(valid.reduce((a,b)=>a+b,0)/valid.length));
  function calcAo(n) {
    if (valid.length < n) return "-";
    const lastN = valid.slice(0, n), s = [...lastN].sort((a,b)=>a-b);
    if (n === 5) return fmtTime(Math.round((s[1]+s[2]+s[3])/3));
    if (n === 12) { const mid = s.slice(1,11); return fmtTime(Math.round(mid.reduce((a,b)=>a+b,0)/10)); }
  }
  document.getElementById("s-ao5").textContent = calcAo(5);
  document.getElementById("s-ao12").textContent = calcAo(12);
}

function setPenalty(idx, penalty) { if (idx >= 0 && idx < times.length) { times[idx].penalty = times[idx].penalty === penalty ? "none" : penalty; renderTimes(); updateStats(); saveTimes(); } }
function deleteTime(idx) { if (idx >= 0 && idx < times.length) { times.splice(idx,1); renderTimes(); updateStats(); saveTimes(); } }

function renderTimes() {
  const tbody = document.getElementById("times-body");
  tbody.innerHTML = times.map((t, i) => {
    const eff = effectiveTime(t); let cls = "", display = fmtTime(t.raw);
    if (t.penalty === "dnf") { cls = "dnf"; display = "DNF (" + fmtTime(t.raw) + ")"; }
    else if (t.penalty === "plus2") { cls = "plus2"; display = fmtTime(t.raw) + " +2 = " + fmtTime(eff); }
    const p2active = t.penalty === "plus2" ? " act-active" : "", dnfActive = t.penalty === "dnf" ? " act-active" : "";
    return "<tr><td class=\"t-idx\">" + (times.length-i) + "</td><td class=\"t-time " + cls + "\">" + display + "</td><td>" +
      "<button class=\"act-btn" + p2active + "\" data-idx=\"" + i + "\" data-act=\"plus2\">+2</button>" +
      "<button class=\"act-btn" + dnfActive + "\" data-idx=\"" + i + "\" data-act=\"dnf\">DNF</button>" +
      "<button class=\"act-btn\" data-idx=\"" + i + "\" data-act=\"del\">X</button></td></tr>";
  }).join("");
  tbody.querySelectorAll(".t-time").forEach(td => {
    td.addEventListener("click", () => {
      const row = td.parentElement;
      const next = row.nextElementSibling;
      if (next && next.classList.contains("scramble-pop")) { next.classList.toggle("show"); return; }
      const idx = parseInt(row.querySelector("[data-act]").dataset.idx);
      if (idx >= 0 && idx < times.length && times[idx].scramble) {
        const pop = document.createElement("tr");
        pop.className = "scramble-pop show";
        pop.innerHTML = "<td></td><td colspan=\"2\">" + times[idx].scramble + "</td>";
        row.after(pop);
      }
    });
  });
  tbody.querySelectorAll(".act-btn").forEach(btn => { btn.addEventListener("click", () => { const idx = parseInt(btn.dataset.idx), act = btn.dataset.act; if (act === "del") deleteTime(idx); else setPenalty(idx, act); }); });
}

(function(){
  const cv=document.getElementById("stars-canvas"),ctx=cv.getContext("2d");
  let stars=[],w,h;
  function resize(){w=cv.width=window.innerWidth;h=cv.height=window.innerHeight}
  resize();window.addEventListener("resize",resize);
  for(let i=0;i<200;i++)stars.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.6+0.3,a:Math.random(),s:Math.random()*0.01+0.003,d:Math.random()<0.5});
  function draw(t){
    ctx.clearRect(0,0,w,h);
    stars.forEach(s=>{
      let alpha=s.a+Math.sin(t*s.s+s.d*10)*0.3;
      alpha=Math.max(0.15,Math.min(1,alpha));
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle='rgba(200,220,255,'+alpha+')';ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();
